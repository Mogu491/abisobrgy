<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AbisoBrgy</title>
  <link rel="stylesheet" href="FrontPage.css" />
</head>
<body>
  <header class="navbar">
    <div class="logo-container">
      <img src="4b.png" alt="AbisoBrgy Logo" class="logo">
      <div class="logo-text">AbisoBrgy</div>
    </div>
    <nav>
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li class="dropdown">
          <button id="dropBtn" class="dropbtn">More <span class="arrow">&#9662;</span></button>
          <div id="dropdownMenu" class="dropdown-content">
            <a href="AdminLogin.html">Admin</a>
            <a href="chart.html">Chart</a>
            <a href="settings.html">Settings</a>
          </div>
        </li>
      </ul>
    </nav>
  </header>

  <section class="hero">
    <div class="hero-text">
      <h1>Stay Informed.<br>Stay Prepared.</h1>
      <p>Receive barangay alerts and announcements instantly via SMS.</p>
      <button class="btn" onclick="location.href='Login.html'">Get Started</button>
    </div>
    <div class="hero-image">
      <img src="4a.png" alt="Community Illustration">
    </div>
  </section>

  <script>
    const dropBtn = document.getElementById('dropBtn');
    const dropdownMenu = document.getElementById('dropdownMenu');

    dropBtn.addEventListener('click', () => {
      dropdownMenu.classList.toggle('show');
      dropBtn.querySelector('.arrow').classList.toggle('rotate');
    });

    window.addEventListener('click', (event) => {
      if (!event.target.closest('.dropdown')) {
        dropdownMenu.classList.remove('show');
        dropBtn.querySelector('.arrow').classList.remove('rotate');
      }
    });
  </script>
</body>
</html>
